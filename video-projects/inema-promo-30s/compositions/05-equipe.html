<template id="05-equipe-template">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=block" rel="stylesheet" />

  <div data-composition-id="05-equipe" data-start="0" data-duration="4.7" data-width="1920" data-height="1080">
    <div class="stage">
      <div class="bg-grid"></div>

      <div class="headline">
        <div class="line-a"><span class="w">Crie</span> <span class="w">sua</span> <span class="w accent">equipe.</span></div>
        <div class="line-b"><span class="w">Seu</span> <span class="w accent2">time.</span></div>
      </div>

      <div class="cluster">
        <div class="node n1"></div>
        <div class="node n2"></div>
        <div class="node n3"></div>
        <div class="node n4"></div>
        <div class="node n5"></div>
        <div class="link l1"></div>
        <div class="link l2"></div>
        <div class="link l3"></div>
        <div class="link l4"></div>
      </div>

      <div class="caption">Formação prática para times que vão atuar no novo mundo</div>

      <div class="vignette"></div>
      <div class="grain"></div>
    </div>

    <style>
      [data-composition-id="05-equipe"] { position: absolute; inset: 0; overflow: hidden; background: #05070b; }
      [data-composition-id="05-equipe"] .stage { position: absolute; inset: 0; }
      [data-composition-id="05-equipe"] .bg-grid {
        position: absolute; inset: 0;
        background:
          repeating-linear-gradient(0deg,  rgba(56,189,248,0.05) 0 1px, transparent 1px 60px),
          repeating-linear-gradient(90deg, rgba(56,189,248,0.05) 0 1px, transparent 1px 60px);
      }
      [data-composition-id="05-equipe"] .headline {
        position: absolute; top: 24%; left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }
      [data-composition-id="05-equipe"] .line-a,
      [data-composition-id="05-equipe"] .line-b {
        font-family: "Inter", sans-serif;
        font-weight: 800;
        font-size: 128px;
        letter-spacing: -0.03em;
        line-height: 1.05;
        color: #fff;
      }
      [data-composition-id="05-equipe"] .w { display: inline-block; opacity: 0; transform: translateY(30px); }
      [data-composition-id="05-equipe"] .accent {
        background: linear-gradient(180deg, #FACC15 0%, #f09025 100%);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; color: transparent;
      }
      [data-composition-id="05-equipe"] .accent2 {
        background: linear-gradient(180deg, #38bdf8 0%, #7dd3fc 100%);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; color: transparent;
      }

      [data-composition-id="05-equipe"] .cluster {
        position: absolute;
        top: 64%; left: 50%;
        width: 800px; height: 240px;
        transform: translateX(-50%);
      }
      [data-composition-id="05-equipe"] .node {
        position: absolute;
        width: 72px; height: 72px; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #FACC15, #f09025);
        box-shadow: 0 0 40px rgba(250,204,21,0.5);
        opacity: 0;
        transform: scale(0);
      }
      [data-composition-id="05-equipe"] .node.n1 { top: 90px; left: 50px; }
      [data-composition-id="05-equipe"] .node.n2 { top: 20px; left: 230px; background: radial-gradient(circle at 30% 30%, #38bdf8, #0369a1); box-shadow: 0 0 40px rgba(56,189,248,0.5); }
      [data-composition-id="05-equipe"] .node.n3 { top: 90px; left: 410px; background: radial-gradient(circle at 30% 30%, #FACC15, #f09025); box-shadow: 0 0 40px rgba(250,204,21,0.5); }
      [data-composition-id="05-equipe"] .node.n4 { top: 20px; left: 590px; background: radial-gradient(circle at 30% 30%, #38bdf8, #0369a1); box-shadow: 0 0 40px rgba(56,189,248,0.5); }
      [data-composition-id="05-equipe"] .node.n5 { top: 90px; left: 720px; background: radial-gradient(circle at 30% 30%, #ffffff, #c0c8d4); box-shadow: 0 0 40px rgba(255,255,255,0.5); }

      [data-composition-id="05-equipe"] .link {
        position: absolute; height: 2px;
        background: linear-gradient(90deg, rgba(250,204,21,0.8), rgba(56,189,248,0.8));
        transform-origin: 0 50%;
        opacity: 0;
      }
      [data-composition-id="05-equipe"] .link.l1 { top: 126px; left: 86px; width: 180px; transform: rotate(-20deg); }
      [data-composition-id="05-equipe"] .link.l2 { top: 56px; left: 266px; width: 180px; transform: rotate(20deg); }
      [data-composition-id="05-equipe"] .link.l3 { top: 126px; left: 446px; width: 180px; transform: rotate(-20deg); }
      [data-composition-id="05-equipe"] .link.l4 { top: 56px; left: 626px; width: 130px; transform: rotate(20deg); }

      [data-composition-id="05-equipe"] .caption {
        position: absolute; bottom: 120px; left: 50%;
        transform: translateX(-50%);
        font-family: "Inter", sans-serif;
        font-weight: 500;
        font-size: 28px;
        color: rgba(255,255,255,0.72);
        letter-spacing: 0.01em;
        opacity: 0;
      }

      [data-composition-id="05-equipe"] .vignette {
        position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.85) 95%);
      }
      [data-composition-id="05-equipe"] .grain {
        position: absolute; inset: 0; pointer-events: none; opacity: 0.07;
        background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 3px 3px;
      }
    </style>

    <script>
      (() => {
        const SLOT = 4.7;
        const tl = gsap.timeline({ paused: true });
        const sel = (q) => `[data-composition-id="05-equipe"] ${q}`;

        tl.to(sel('.line-a .w'), { opacity: 1, y: 0, duration: 0.5, stagger: 0.07, ease: 'expo.out' }, 0);
        tl.to(sel('.line-b .w'), { opacity: 1, y: 0, duration: 0.5, stagger: 0.07, ease: 'expo.out' }, 0.5);
        tl.to(sel('.node'), { opacity: 1, scale: 1, duration: 0.5, stagger: 0.1, ease: 'back.out(1.6)' }, 1.3);
        tl.to(sel('.link'), { opacity: 1, duration: 0.3, stagger: 0.1, ease: 'power2.out' }, 1.5);
        tl.to(sel('.caption'), { opacity: 1, duration: 0.5, ease: 'power2.out' }, 2.5);

        tl.to({}, { duration: SLOT }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines['05-equipe'] = tl;
      })();
    </script>
  </div>
</template>
