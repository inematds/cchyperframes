<template id="08-cta-outro-template">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=block" rel="stylesheet" />

  <div data-composition-id="08-cta-outro" data-start="0" data-duration="5" data-width="1920" data-height="1080">
    <div class="stage">
      <div class="grid-floor"></div>
      <div class="glow-bg"></div>

      <div class="outro-lockup">
        <div class="brand">
          <span class="b-inema">INEMA</span><span class="b-dot">.</span><span class="b-club">CLUB</span>
        </div>
        <div class="shimmer"></div>

        <div class="tagline">Comece sua jornada agora.</div>

        <div class="cta">
          <span class="cta-action">Entrar</span>
          <span class="cta-sep">—</span>
          <span class="cta-url">inema.club</span>
        </div>
      </div>

      <div class="vignette"></div>
      <div class="grain"></div>
    </div>

    <style>
      [data-composition-id="08-cta-outro"] { position: absolute; inset: 0; overflow: hidden; background: #05070b; }
      [data-composition-id="08-cta-outro"] .stage { position: absolute; inset: 0; }
      [data-composition-id="08-cta-outro"] .grid-floor {
        position: absolute; inset: 0;
        transform: perspective(900px) rotateX(62deg) translateY(30%);
        background:
          repeating-linear-gradient(0deg,  rgba(250,204,21,0.08) 0 1px, transparent 1px 80px),
          repeating-linear-gradient(90deg, rgba(56,189,248,0.08) 0 1px, transparent 1px 80px);
      }
      [data-composition-id="08-cta-outro"] .glow-bg {
        position: absolute;
        top: 50%; left: 50%;
        width: 1600px; height: 900px;
        transform: translate(-50%, -50%);
        background: radial-gradient(ellipse, rgba(250,204,21,0.18), rgba(240,144,37,0.08) 40%, transparent 70%);
        filter: blur(40px);
        mix-blend-mode: screen;
        opacity: 0;
      }
      [data-composition-id="08-cta-outro"] .outro-lockup {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 36px;
        text-align: center;
      }
      [data-composition-id="08-cta-outro"] .brand {
        position: relative;
        font-family: "Inter", sans-serif;
        font-weight: 900;
        font-size: 168px;
        letter-spacing: -0.04em;
        line-height: 1;
        white-space: nowrap;
        opacity: 0;
      }
      [data-composition-id="08-cta-outro"] .b-inema {
        background: linear-gradient(180deg, #ffffff 0%, #e0e8f0 50%, #8d9db0 100%);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; color: transparent;
        text-shadow: 0 0 60px rgba(255,255,255,0.4);
      }
      [data-composition-id="08-cta-outro"] .b-dot {
        color: #FACC15;
        text-shadow: 0 0 40px rgba(250,204,21,0.8);
      }
      [data-composition-id="08-cta-outro"] .b-club {
        background: linear-gradient(180deg, #FACC15 0%, #f09025 100%);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; color: transparent;
        text-shadow: 0 0 60px rgba(250,204,21,0.5);
      }
      [data-composition-id="08-cta-outro"] .shimmer {
        position: absolute; top: 0; left: 0;
        width: 300px; height: 180px;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);
        filter: blur(6px);
        transform: translateX(-300%);
        opacity: 0;
        mix-blend-mode: screen;
        pointer-events: none;
      }
      [data-composition-id="08-cta-outro"] .tagline {
        font-family: "Inter", sans-serif;
        font-weight: 500;
        font-size: 44px;
        color: rgba(255,255,255,0.85);
        letter-spacing: 0.005em;
        opacity: 0;
      }
      [data-composition-id="08-cta-outro"] .cta {
        margin-top: 8px;
        padding: 20px 48px;
        border-radius: 999px;
        font-family: "Inter", sans-serif;
        font-weight: 700;
        font-size: 32px;
        letter-spacing: 0.02em;
        color: #05070b;
        background: linear-gradient(135deg, #FACC15 0%, #f09025 100%);
        border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 0 0 60px rgba(250,204,21,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
        opacity: 0;
        transform: scale(0.92);
        display: inline-flex;
        align-items: center;
        gap: 14px;
      }
      [data-composition-id="08-cta-outro"] .cta-sep { opacity: 0.55; }
      [data-composition-id="08-cta-outro"] .cta-url { font-weight: 500; }

      [data-composition-id="08-cta-outro"] .vignette {
        position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.92) 95%);
        opacity: 0.7;
      }
      [data-composition-id="08-cta-outro"] .grain {
        position: absolute; inset: 0; pointer-events: none; opacity: 0.08;
        background-image:
          radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size: 3px 3px, 5px 5px;
      }
    </style>

    <script>
      (() => {
        const SLOT = 5;
        const tl = gsap.timeline({ paused: true });
        const sel = (q) => `[data-composition-id="08-cta-outro"] ${q}`;

        tl.to(sel('.glow-bg'), { opacity: 0.9, duration: 1.2, ease: 'power2.out' }, 0);
        tl.fromTo(sel('.brand'),
          { opacity: 0, scale: 0.88 },
          { opacity: 1, scale: 1, duration: 0.6, ease: 'back.out(1.2)' }, 0.1);

        tl.fromTo(sel('.tagline'),
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' }, 0.6);

        tl.fromTo(sel('.cta'),
          { opacity: 0, scale: 0.92 },
          { opacity: 1, scale: 1, duration: 0.55, ease: 'back.out(1.3)' }, 1.0);

        const shimmer = (t) => {
          tl.set(sel('.shimmer'), { opacity: 1, xPercent: -150 }, t);
          tl.to(sel('.shimmer'), { xPercent: 500, duration: 0.75, ease: 'power2.inOut' }, t);
          tl.to(sel('.shimmer'), { opacity: 0, duration: 0.1 }, t + 0.7);
        };
        shimmer(1.4);
        shimmer(3.2);
        shimmer(4.4);

        tl.to(sel('.glow-bg'), { opacity: 0.7, duration: 2.5, yoyo: true, repeat: 1, ease: 'sine.inOut' }, 1);

        tl.to({}, { duration: SLOT }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines['08-cta-outro'] = tl;
      })();
    </script>
  </div>
</template>
