<template id="02-tensao-template">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=block" rel="stylesheet" />

  <div data-composition-id="02-tensao" data-start="0" data-duration="4" data-width="1920" data-height="1080">
    <div class="stage">
      <div class="noise-bg"></div>
      <div class="scatter">
        <span class="chip" style="--x:-420; --y:-180; --r:-8">dados</span>
        <span class="chip" style="--x:380; --y:-220; --r:6">tutoriais</span>
        <span class="chip" style="--x:-280; --y:60;  --r:-4">cursos</span>
        <span class="chip" style="--x:460; --y:80;   --r:10">vídeos</span>
        <span class="chip" style="--x:-460;--y:200;  --r:-12">threads</span>
        <span class="chip" style="--x:300; --y:240;  --r:4">ebooks</span>
        <span class="chip" style="--x:-120;--y:-260; --r:-6">prompts</span>
        <span class="chip" style="--x:120; --y:280;  --r:8">talks</span>
      </div>

      <div class="headline">
        <div class="line-1"><span class="w">Mas</span> <span class="w">a</span> <span class="w">maioria</span></div>
        <div class="line-2"><span class="w">ainda</span> <span class="w">está</span> <span class="w accent">sem direção.</span></div>
      </div>

      <div class="vignette"></div>
      <div class="grain"></div>
    </div>

    <style>
      [data-composition-id="02-tensao"] { position: absolute; inset: 0; overflow: hidden; background: #05070b; }
      [data-composition-id="02-tensao"] .stage { position: absolute; inset: 0; }
      [data-composition-id="02-tensao"] .noise-bg {
        position: absolute; inset: 0;
        background:
          radial-gradient(ellipse at 20% 30%, rgba(240,144,37,0.10), transparent 60%),
          radial-gradient(ellipse at 80% 70%, rgba(56,189,248,0.08), transparent 60%);
      }
      [data-composition-id="02-tensao"] .scatter {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 1400px; height: 600px;
      }
      [data-composition-id="02-tensao"] .chip {
        position: absolute; top: 50%; left: 50%;
        transform: translate(calc(-50% + calc(var(--x) * 1px)), calc(-50% + calc(var(--y) * 1px))) rotate(calc(var(--r) * 1deg));
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 28px;
        padding: 10px 20px;
        border-radius: 999px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.10);
        color: rgba(255,255,255,0.55);
        opacity: 0;
      }
      [data-composition-id="02-tensao"] .headline {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 10;
      }
      [data-composition-id="02-tensao"] .line-1,
      [data-composition-id="02-tensao"] .line-2 {
        font-family: "Inter", sans-serif;
        font-weight: 800;
        font-size: 120px;
        letter-spacing: -0.03em;
        line-height: 1.05;
        color: #fff;
      }
      [data-composition-id="02-tensao"] .w { display: inline-block; opacity: 0; }
      [data-composition-id="02-tensao"] .w.accent {
        background: linear-gradient(180deg, #ff7a7a 0%, #f09025 100%);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; color: transparent;
        text-shadow: 0 0 30px rgba(240,144,37,0.4);
      }
      [data-composition-id="02-tensao"] .vignette {
        position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.9) 95%);
      }
      [data-composition-id="02-tensao"] .grain {
        position: absolute; inset: 0; pointer-events: none; opacity: 0.08;
        background-image:
          radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 3px 3px;
      }
    </style>

    <script>
      (() => {
        const SLOT = 4;
        const tl = gsap.timeline({ paused: true });
        const sel = (q) => `[data-composition-id="02-tensao"] ${q}`;

        tl.to(sel('.chip'), {
          opacity: 0.9, duration: 0.5, stagger: { amount: 0.6, from: 'random' }, ease: 'power2.out'
        }, 0);
        tl.to(sel('.line-1 .w'), { opacity: 1, duration: 0.35, stagger: 0.06, ease: 'expo.out' }, 0.8);
        tl.to(sel('.line-2 .w'), { opacity: 1, duration: 0.35, stagger: 0.06, ease: 'expo.out' }, 1.3);
        tl.to(sel('.chip'), { opacity: 0.3, duration: 0.5, ease: 'power2.in' }, 2.0);
        tl.to(sel('.chip'), {
          scale: 0.6, opacity: 0, duration: 0.6,
          stagger: { amount: 0.3, from: 'edges' }, ease: 'power3.in'
        }, 3.1);

        tl.to({}, { duration: SLOT }, 0);
        window.__timelines = window.__timelines || {};
        window.__timelines['02-tensao'] = tl;
      })();
    </script>
  </div>
</template>
