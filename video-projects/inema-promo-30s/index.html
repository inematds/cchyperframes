<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>INEMA.CLUB — 30s Promo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #05070b;
        color: #fff;
      }
      .beat-layer {
        position: absolute;
        top: 0; left: 0;
        width: 1920px;
        height: 1080px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="inema-promo-30s"
      data-start="0"
      data-duration="30"
      data-width="1920"
      data-height="1080"
    >
      <!-- Beat 01 — Hook: "O futuro já começou" (0–4s) -->
      <div class="beat-layer"
        data-composition-id="01-hook"
        data-composition-src="compositions/01-hook.html"
        data-start="0" data-duration="4" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 02 — Tensão: "sem direção" (4–8s) -->
      <div class="beat-layer"
        data-composition-id="02-tensao"
        data-composition-src="compositions/02-tensao.html"
        data-start="4" data-duration="4" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 03 — Brand Reveal: INEMA.CLUB (8–10s) -->
      <div class="beat-layer"
        data-composition-id="03-brand-reveal"
        data-composition-src="compositions/03-brand-reveal.html"
        data-start="8" data-duration="2" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 04 — Proposta: Cursos/Trilhas/Comunidade/Prática (10–14.8s) -->
      <div class="beat-layer"
        data-composition-id="04-valor"
        data-composition-src="compositions/04-valor.html"
        data-start="10" data-duration="4.8" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 05 — Equipe/Time (14.8–19.5s) -->
      <div class="beat-layer"
        data-composition-id="05-equipe"
        data-composition-src="compositions/05-equipe.html"
        data-start="14.8" data-duration="4.7" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 06 — Pilares: IA / Automação / Agentes / Robótica (19.5–22s) -->
      <div class="beat-layer"
        data-composition-id="06-pilares"
        data-composition-src="compositions/06-pilares.html"
        data-start="19.5" data-duration="2.5" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 07 — Jornada/callback (22–25s) -->
      <div class="beat-layer"
        data-composition-id="07-jornada"
        data-composition-src="compositions/07-jornada.html"
        data-start="22" data-duration="3" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Beat 08 — CTA Outro (25–30s) -->
      <div class="beat-layer"
        data-composition-id="08-cta-outro"
        data-composition-src="compositions/08-cta-outro.html"
        data-start="25" data-duration="5" data-track-index="0"
        data-width="1920" data-height="1080"></div>

      <!-- Narração inemavox (primeiros 30s com fades) -->
      <audio id="narration"
        data-start="0" data-duration="30" data-track-index="1" data-volume="0.85"
        src="assets/inemavox-narration.mp3"></audio>

      <!-- Trilha ambiente warm-pad sub-mixed -->
      <audio id="warm-pad"
        data-start="0" data-duration="30" data-track-index="2" data-volume="0.10"
        src="assets/warm-pad.mp3"></audio>

      <!-- SFX whoosh virada beat 02 → 03 -->
      <audio id="sfx-whoosh-1"
        data-start="7.7" data-duration="0.4" data-track-index="3" data-volume="0.18"
        src="assets/sfx-whoosh-1.mp3"></audio>

      <!-- SFX twinkle no brand reveal -->
      <audio id="sfx-twinkle"
        data-start="8.4" data-duration="0.5" data-track-index="4" data-volume="0.22"
        src="assets/sfx-twinkle.mp3"></audio>

      <!-- SFX whoosh entrada do CTA -->
      <audio id="sfx-whoosh-2"
        data-start="24.8" data-duration="0.5" data-track-index="5" data-volume="0.18"
        src="assets/sfx-whoosh-2.mp3"></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.to({}, { duration: 30 }, 0);
      window.__timelines["inema-promo-30s"] = tl;
    </script>
  </body>
</html>
